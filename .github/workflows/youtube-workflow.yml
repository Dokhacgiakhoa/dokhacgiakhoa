name: Latest YouTube Videos

on:
  schedule:
    # Chạy tự động hàng ngày lúc 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch: # Cho phép kích hoạt thủ công
  push:
    branches:
      - main

jobs:
  update-readme-with-youtube:
    name: Update this repo's README with latest videos from YouTube
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate Matrix Badges
        run: node generate-matrix-badges.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and Push Badges
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add profile-3d-custom/*.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update matrix badges"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull YouTube Videos
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          comment_tag_name: "YOUTUBE-VIDEOS-LIST"
          feed_list: "https://www.youtube.com/feeds/videos.xml?channel_id=UC3NK5QoKv-1dWEPV9IN9alg"
          max_post_count: 5
          template: "- [$title]($url) ($date)"
          date_format: "dd/mm/yyyy"
